name: Frontend CI

on:
  push:
    paths:
      - "frontend/**"
  pull_request:
    paths:
      - "frontend/**"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend   # all steps run inside frontend/ automatically

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci                    # reproducible install from lockfile

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run build             # vite build runs tsc internally — catches type errors

      - name: Build
        run: npm run build
